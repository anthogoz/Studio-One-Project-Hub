name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 4.2.1)'
        required: true
        type: string
      notes:
        description: 'Optional release notes (fallback: auto-generated notes)'
        required: false
        type: string
        default: ''

permissions:
  contents: write  # needed to create GitHub Releases

jobs:
  # ─────────────────────────────────────────────
  # Windows build → produces .exe installer (NSIS)
  # ─────────────────────────────────────────────
  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Update package.json version
        run: npm version ${{ github.event.inputs.version }} --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Build Vite frontend
        run: npm run build

      - name: Package Electron app (Windows)
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe
          retention-days: 5

  # ─────────────────────────────────────────────
  # macOS build → produces .dmg (Intel + Apple Silicon)
  # ─────────────────────────────────────────────
  build-macos:
    name: Build macOS (.dmg)
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Update package.json version
        run: npm version ${{ github.event.inputs.version }} --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Build Vite frontend
        run: npm run build

      - name: Package Electron app (macOS)
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: release/*.dmg
          retention-days: 5

  # ─────────────────────────────────────────────
  # Linux build → produces .AppImage
  # ─────────────────────────────────────────────
  build-linux:
    name: Build Linux (.AppImage)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Update package.json version
        run: npm version ${{ github.event.inputs.version }} --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Build Vite frontend
        run: npm run build

      - name: Package Electron app (Linux)
        run: npx electron-builder --linux --publish never

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: release/*.AppImage
          retention-days: 5

  # ─────────────────────────────────────────────
  # Create GitHub Release with all platform binaries
  # ─────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/macos

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: artifacts/linux

      - name: Normalize Version
        id: versioning
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.versioning.outputs.tag }}
          name: "Studio One Project Hub ${{ steps.versioning.outputs.tag }}"
          generate_release_notes: true
          body: |
            ${{ github.event.inputs.notes != '' && format('{0}\n\n', github.event.inputs.notes) || '' }}## 🌀 Studio One Project Hub ${{ steps.versioning.outputs.tag }}

            A powerful companion app for **PreSonus Studio One** — analyze, visualize, and maintain your music projects directly from a desktop UI.

            ### 📦 Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | 🪟 Windows | `.exe` installer | Windows 10/11 x64 |
            | 🍎 macOS | `.dmg` | Intel + Apple Silicon (arm64) |
            | 🐧 Linux | `.AppImage` | x64 |

            ### 📋 What's included
            - 📊 Dashboard — metadata, tracks, audio clips overview
            - 🎛️ Mixer Console — inserts, sends, routing
            - 🔗 Signal Flow Map — visual routing graph
            - 📁 Plugin Doctor — VST2→VST3 remapping
            - ❄️ Freeze & Latency Advisor — CPU/latency scoring
            - 🔍 Missing Media Relinker — repair broken file paths
            - 🎼 Sound Variations Editor — articulation maps + Cubase importer
            - 🕐 Version History — snapshot diffing
            - 🎨 Session Colorizer — auto color-coding rules
            - ...and more

            > **Note:** On first launch, the app will ask you to set your Studio One Songs folder.
          files: |
            artifacts/windows/*.exe
            artifacts/macos/*.dmg
            artifacts/linux/*.AppImage
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
